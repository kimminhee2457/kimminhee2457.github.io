<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>입학안내</title>
    <link rel="stylesheet" href="index.css">
    <style>
        .board-table {
            width: 100%;
            font-size: 0.8rem;
            margin-top: 8px;
        }
        .board-table th, .board-table td {
            padding: 6px;
            text-align: center;
        }
        .faq-box {
            margin-top: 8px;
            font-size: 0.85rem;
        }
        .faq-item {
            margin-bottom: 8px;
            padding-bottom: 8px;
            border-bottom: 1px dashed #e2e8f0;
        }
        .faq-q 
            { color: #38bdf8; font-weight: bold; }
        .faq-a 
            { color: #475569; display: block; margin-top: 2px; }
    </style>
</head>
<body>
    <header class="top">
        <a href="index.html" class="top-logo">동미고등학교</a>
        <button class="top-toggle" aria-label="메뉴 열기">
            ☰
        </button>
        <nav class="top-menu">
            <a href="./introduce.html">학교소개</a>
            <a href="./tidings.html">학교소식</a>
            <a href="./entrance.html">입학안내</a>
            <a href="./life.html">학생생활</a>
        </nav>
    </header>

    <main class="card-list">
        <div class="card">
            <a>2026학년도 신입생 모집 요강</a>
            <table class="board-table">
                <tr>
                    <th>모집 정원</th>
                    <td>일반계 고등학교 8학급 (총 200명)</td>
                </tr>
                <tr>
                    <th>원서 접수</th>
                    <td>2026.12.07(월) ~ 12.11(금)</td>
                </tr>
                <tr>
                    <th>면접 전형</th>
                    <td>2026.12.16(수) 본교 지정 교실</td>
                </tr>
                <tr>
                    <th>합격 발표</th>
                    <td>2026.12.22(화) 14:00 홈페이지</td>
                </tr>
            </table>
        </div>

        <div class="card">
            <a>입학 FAQ</a>
            <div class="faq-box">
                <div class="faq-item">
                    <span class="faq-q">Q. 기숙사가 운영되나요?</span>
                    <span class="faq-a">A. 본교는 통학형 학교로 원거리 학생을 위한 스쿨버스를 운행합니다.</span>
                </div>
                <div class="faq-item">
                    <span class="faq-q">Q. 교복 구매는 어떻게 하나요?</span>
                    <span class="faq-a">A. 합격자 발표 후 학교 주관 구매를 통해 안내해 드립니다.</span>
                </div>
            </div>
        </div>
    </main>

    <script>
        const toggleBtn = document.querySelector('.top-toggle');
        const topMenu = document.querySelector('.top-menu');

        toggleBtn.addEventListener('click', function () {
            topMenu.classList.toggle('show');
        });
    </script>
</body>
</html>
