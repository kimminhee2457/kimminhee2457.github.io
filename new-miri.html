<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>새소식 미리보기</title>
    <style>
        .board-container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px;
        }
        .board-list {
            width: 100%;
            margin-bottom: 30px;
            border-collapse: collapse;
        }
        .board-list th, .board-list td {
            border-bottom: 1px solid #ddd;
            padding: 12px;
            text-align: center;
        }
        .board-list th {
            background-color: skyblue;
            font-weight: bold;
        }
        .board-list td a {
            color: #000;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <main class="board-container">
        <table class="board-list">
            <thead>
                <tr>
                    <th>번호</th>
                    <th>제목</th>
                    <th>작성일</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>5</td>
                    <td> [동아리] 방송부 신입 부원 최종 합격자 발표</td>
                    <td>2026-06-12</td>
                </tr>
                <tr>
                    <td>4</td>
                    <td> [체육] 학년별 반대항 축구대회 대진표</td>
                    <td>2026-06-09</td>
                </tr>
                <tr>
                    <td>3</td>
                    <td> [이벤트] 수요일 급식 디저트 데이 안내</td>
                    <td>2026-06-03</td>
                </tr>
                <tr>
                    <td>2</td>
                    <td> [수상] 전국 고교 과학탐구대회 우수작</td>
                    <td>2026-05-29</td>
                </tr>
                <tr>
                    <td>1</td>
                    <td> [행사] 현장체험학습 사진 공모전 개최</td>
                    <td>2026-05-18</td>
                </tr>
            </tbody>
        </table>
    </main>
</body>
</html>
